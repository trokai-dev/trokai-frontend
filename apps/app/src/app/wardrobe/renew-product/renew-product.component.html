<ion-content>
  <ion-grid class="px-24 mt-40">

    <h6 class="color-gray-dark ion-text-center">Renovar anúncio</h6>

    <ion-row class="flex justify-center mt-32">
      <label class="label-body-2 ion-text-center">
        Que tal dar uma atualizada no anúncio antes de renovar?
        Pode ser legal caprichar mais nas informações para chamar mais atenção.
      </label>
    </ion-row>

  </ion-grid>
</ion-content>

<ion-footer class="px-24 py-16">
  <ion-row>
    <ion-button (click)="editFirst()" class="action-button"> Editar antes
    </ion-button>
  </ion-row>
  <ion-row class="mt-8">
    <ion-button (click)="renew()" class="action-button" fill="clear"> Renovar sem editar
    </ion-button>
  </ion-row>
</ion-footer>
