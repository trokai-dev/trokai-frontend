<ion-header>
  <ion-toolbar mode="ios">
    <app-back-button defaultHref="/main/home"></app-back-button>
    <ion-title>Ajuda</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid class="p-24">
    <div class="row">
      <div class="col">
        <span class="section-title">Dúvidas Frequentes</span>

        <div class="row mt-16">
          <div class="col-12 col-md-3">
            <a routerLink="faq/seller">
              <div class="support-area">
                <!-- botao vendedor -->
                <ion-icon class="color-primary" name="storefront-outline" />
                <h4>Vendas</h4>
              </div>
            </a>
          </div>

          <div class="col-12 col-md-3 mt-24 mt-md-0">
            <a routerLink="faq/buyer">
              <div class="support-area">
                <!-- botao comprador -->
                <ion-icon class="color-primary" name="cart-outline" />
                <h4>Compras</h4>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-40">
      <div class="col">
        <span class="section-title mb-4">Fale com o Trokaí</span>
        <span class="label-body-2">
          Se não encontrou a resposta para sua dúvida, entre em contato com a
          gente! Estamos prontos para ajudar.
        </span>

        <div class="row mt-16">
          <div class="col-12 col-md-3">
            <a (click)="contact()">
              <div class="support-area">
                <!-- botao vendedor -->
                <ion-icon class="color-primary" name="mail-outline" />
                <h4>Entrar em contato</h4>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </ion-grid>
</ion-content>
