<ion-header>
  <ion-toolbar class="clear">
    <app-back-button
      [nav]="true"
      (buttonClick)="clickBack()"
      defaultHref="/main/auth"
    ></app-back-button>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid class="p-24">
    <h6 class="color-gray-dark mt-40">Digite seu email</h6>

    <tk-recovery-email-form
      class="mt-40 d-block"
      (submitted)="next($event)"
    ></tk-recovery-email-form>
  </ion-grid>
</ion-content>
