<ion-header>
  <ion-toolbar mode="ios">
    <app-back-button
      [nav]="true"
      (buttonClick)="clickBack()"
      defaultHref="/main/auth"
    ></app-back-button>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="flex justify-center p-24">
    <tk-login-form
      class="w-full mt-40"
      [loading]="loading"
      (submitted)="login($event)"
      (forgotPassword)="toForgot()"
      (register)="toRegister()"
    ></tk-login-form>
  </div>
</ion-content>
