@if (interval && timeLeft && timeLeft.getTime() > 0) {
<div class="reserved-info">
  @if (!timerOnly) {
  <button
    mat-flat-button
    (click)="reserveOpen.emit()"
    [color]="color"
    class="action-button w-full mt-8"
  >
    <b> {{ text }} ({{ timeLeft | date : "mm:ss" }})</b>
  </button>
  }

  @if (!hideCancel && !timerOnly) {
  <button
    mat-button
    (click)="cancel()"
    class="btn-tertiary action-button w-full mt-8"
  >
    Cancelar reserva
  </button>
  }

  @if (timerOnly) {
  <ion-text class="color-primary fw-bold px-16">
    {{ timeLeft | date : "mm:ss" }}
  </ion-text>
  }
</div>
}

@if ((!interval && !timeLeft) || timeLeft.getTime() <= 0) {
<div class="reserved-info">
  <button
    mat-flat-button
    (click)="expired()"
    [color]="color"
    class="action-button w-full mt-8"
  >
    <b>Reserva expirada</b>
  </button>
</div>
}
