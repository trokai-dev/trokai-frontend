<ion-header>
  <ion-toolbar
    mode="ios"
    style="
      padding-top: 0px !important;
      --padding-start: 0px;
      --padding-end: 0px;
    "
    class="px-24 py-8 clear"
  >
    <ion-buttons slot="primary">
      <ion-icon
        name="close"
        (click)="closeOnly()"
        mode="ios"
        class="modal-close"
      >
      </ion-icon>
    </ion-buttons>
    <ion-title>
      <h3>Ordenar</h3>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="m-24">
    <mat-radio-group [(ngModel)]="sorting" class="w-full">
      @for (op of options; track $index) {
        <div>
          <mat-radio-button color="primary" [value]="op.value">
            <div class="flex flex-col">
              <span class="color-gray-default label-body-1">
                {{ op.text }}</span
              >
              @if (op.text2) {
                <span class="color-gray-light-1 label-body-1 capitalize">
                  {{ op.text2 }}
                </span>
              }
            </div>
          </mat-radio-button>
        </div>
      }
    </mat-radio-group>
  </div>
</ion-content>

<ion-footer class="px-24 py-16">
  <button
    mat-flat-button
    color="primary"
    class="action-button"
    (click)="applySorting()"
  >
    Aplicar
  </button>
</ion-footer>
