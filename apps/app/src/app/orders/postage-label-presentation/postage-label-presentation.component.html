<ion-content>
  <ion-grid class="p-24">

    <h2 class="color-gray-dark mt-24 ion-text-center"> Etiqueta dos Correios </h2>

    <span class="label-body-2 mt-48 block ion-text-center">
      Para realizar a venda através dos correios é necessário que
      você gere uma etiqueta que é disponibilizada pelo Trokaí.
    </span>

    <div class="w-full flex justify-center">
          <!-- <div class="animation" lottie [options]="options"></div> -->
          <div class="animation">
            <ng-lottie [options]="options"></ng-lottie>
          </div>
    </div>

    <span class="label-body-2 color-gray-light-1 block mt-8"> Você deve: </span>

    <div class="mt-8">
      <ul>
        <li>
          <span class="label-body-2 color-gray-default">Gerar e imprimir a etiqueta</span>
        </li>
        <li>
          <span class="label-body-2 color-gray-default"> Colar a etiqueta na embalagem</span>
        </li>
        <li>
          <span class="label-body-2 color-gray-default"> Levar a embalagem aos correios</span>
        </li>
      </ul>
    </div>

  </ion-grid>
</ion-content>

<ion-footer class="px-24 py-16">
  <button mat-flat-button color="primary" class="action-button" (click)="close()">
    Gerar etiqueta
  </button>
</ion-footer>
