<ion-content>
  <ion-grid class="p-24">
    <h2 class="color-gray-dark mt-24 ion-text-center">Conheça o confrinho</h2>

    <ion-label class="label-body-2 mt-48 block ion-text-center">
      Os valores recebidos nas suas vendas serão armazenados no cofrinho.
      Transfira o dinheiro para sua conta bancária através do saque.
    </ion-label>

    <!-- <div class="animation" lottie [options]="options"></div> -->

    <div class="animation">
      <ng-lottie [options]="options"></ng-lottie>
    </div>
  </ion-grid>
</ion-content>

<ion-footer class="px-24 py-16">
  <ion-button class="action-button" (click)="close()">Entendi</ion-button>
</ion-footer>
