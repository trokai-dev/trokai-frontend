<ion-header>
  <ion-toolbar mode="ios">
    <app-back-button
      [nav]="isAuth"
      (buttonClick)="clickBack()"
    ></app-back-button>
    <ion-title>Alterar senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="p-24">
    <tk-new-password-form
      [forgot]="forgot"
      (submitted)="save($event)"
    ></tk-new-password-form>
  </div>
</ion-content>
