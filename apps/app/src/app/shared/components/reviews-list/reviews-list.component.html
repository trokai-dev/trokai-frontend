<ion-header>

      <app-back-button
        defaultHref="/main/home"
        [blockNavigation]="true"
        (buttonClick)="close()"
      ></app-back-button>
    </ion-buttons>
    <ion-title>Avaliações</ion-title>

</ion-header>

<ion-content>

  </div>
</ion-content>
