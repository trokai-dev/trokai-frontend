<ion-content>
  <ion-grid class="p-24">
    <div class="d-flex flex-column justify-content-center align-items-center" style="height: 90vh;">

      <ion-icon name="sad-outline" class="color-gray-dark" style="font-size: 4rem;"></ion-icon>

      @if (outdated) {
      <h2 class=" d-block color-gray-dark mt-56">
        Aplicativo desatualizado
      </h2>
      }

      @if (outdated) {
      <ion-label class="label-body-2 color-gray-default ion-text-center mt-16 mx-8">
       Por favor, atualize seu aplicativo para continuar usando o Trokaí.
      </ion-label>
      }

      @if (banned) {
      <h2 class=" d-block color-gray-dark mt-56">
        Conta banida
      </h2>
      }

      @if (banned) {
      <ion-label class="label-body-2 color-gray-default ion-text-center mt-16 mx-40">
        Sua conta foi banida por violar os termos de uso do Trokaí.
      </ion-label>
      }

      @if (outdated) {
      <ion-button class="action-button mt-56" (click)="openStore()">Atualizar o Trokaí</ion-button>
      }

    </div>
  </ion-grid>
</ion-content>
