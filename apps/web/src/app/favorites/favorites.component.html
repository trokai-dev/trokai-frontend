<div class="container fill-height">
  <h2 class="color-gray-dark capitalize">Favoritos</h2>

  <div class="favorites-grid">
    @for (product of results; track product) {
      <div class="mt-24 pt-16">
        <tk-product-card [clean]="true" [product]="product"></tk-product-card>
      </div>
    }
  </div>

  @if (results.length === 0) {
    <div class="empty-page full">
      <ion-icon name="sad-outline"></ion-icon>
      <span class="label-body-2 block"> Nenhum favorito</span>
      <button routerLink="/search" mat-flat-button color="primary">
        Ver produtos
      </button>
    </div>
  }
</div>
