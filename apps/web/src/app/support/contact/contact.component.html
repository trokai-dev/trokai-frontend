<div class="page">
  <div class="mb-48">
    <button color="primary" mat-button routerLink="/help/">
      <mat-icon>arrow_back</mat-icon> Central de ajuda
    </button>
  </div>

  <div class="contact-card text-center">
    <span class="label-body-1 mb-48 block">
      Dúvidas? Problemas? Sugestões?
      <br />
      Chama que a gente conversa!!
    </span>

    <tk-contact-form
      [showName]="true"
      [loading]="loading"
      (submitted)="sendMail($event)"
    />
  </div>
</div>
