<h3 class="checkout-title">Novo cartão de crédito</h3>

<div class="checkout-body">
  <tk-card-form [user]="user" [onlyForm]="true" [encapsulated]="true" />
</div>

<div class="checkout-footer mt-40">
  <button
    mat-flat-button
    color="primary"
    [disabled]="!cardForm?.form?.valid || !cardForm?.addressValid()"
    (click)="onContinue()"
  >
    Continuar
  </button>
</div>
