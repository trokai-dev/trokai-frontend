@if (title) {
  <div class="row mt-48 pt-0 pt-md-5">
    <div class="col">
      <div
      class="{{
        borderBottom ? 'border-bottom pb-2' : ''
      }} flex justify-between"
        >
        <h3 class="color-gray-dark mb-0">{{ title }}</h3>
        @if (seeMore && navMore) {
          <a
            class="flex items-end"
            (click)="nav()"
            >
            {{ navText }}
          </a>
        }
      </div>
    </div>
  </div>
}

<div class="row row-cols-{{ colsMob }} row-cols-md-{{ colsDesk }}">
  @for (product of products; track product) {
    <div class="col mt-24 pt-16">
      <tk-product-card [product]="product"></tk-product-card>
    </div>
  }
</div>
