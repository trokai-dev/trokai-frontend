<div class="container page">
  <div class="grid-row">
    <div class="gcol-12">
      <h2 class="color-gray-dark capitalize">{{ collectionName }}</h2>
    </div>
  </div>

  <div class="grid-row grid-cols-2 grid-cols-md-5">
    @for (product of results; track product) {
      <div class="mt-24 pt-16">
        <tk-product-card
          [clean]="true"
          [product]="product"
        ></tk-product-card>
      </div>
    }
  </div>

  @if (results.length === 0) {
    <div class="empty-page full">
      <ion-icon name="sad-outline"></ion-icon>
      <span class="label-body-2 block"> Nenhum produto nesta coleção</span>
      <button routerLink="/search" mat-raised-button color="primary">
        Ver produtos
      </button>
    </div>
  }

  <div class="grid-row">
    <div class="gcol-12">
      <app-paginator [paginator]="paginator"></app-paginator>
    </div>
  </div>
</div>
