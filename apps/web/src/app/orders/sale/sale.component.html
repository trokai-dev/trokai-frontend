<div class="mb-48">
  <button color="primary" mat-button routerLink="/orders/sales">
    <mat-icon>arrow_back</mat-icon> Minhas vendas
  </button>
</div>

@if (order) {
  <tk-sale-detail
    [order]="order"
    (openProduct)="openProduct($event)"
    (openChat)="openChat()"
    (goToBank)="goToBank()"
    (cancelOrder)="cancel()"
  >
    <app-order-delivery
      delivery
      [order]="order"
      [isSale]="true"
    ></app-order-delivery>
  </tk-sale-detail>
}
