@if (!hideNav) {
  <mat-drawer-container class="example-container" [hasBackdrop]="true">
    <mat-drawer
      #drawer
      mode="over"
      (closedStart)="onDrawerClosed()"
      (openedStart)="onDrawerOpened()"
    >
      <app-side-menu-nav (menuClose)="drawer.toggle()"></app-side-menu-nav>
    </mat-drawer>
    <mat-drawer-content>
      <div>
        @if (showHeaderAlert && headerAlert) {
          <div class="header-alert">
            <span> {{ headerAlert }} </span>
          </div>
        }

        <app-navbar (toggleNav)="drawer.toggle()"></app-navbar>
        <router-outlet></router-outlet>
        <app-footer></app-footer>

        @if (showCookies) {
          <app-cookies-dialog
            (accepted)="onAcceptCookies()"
          ></app-cookies-dialog>
        }
      </div>
    </mat-drawer-content>
  </mat-drawer-container>
} @else {
  <router-outlet></router-outlet>
}

@if (isDEV) {
  <div class="app-stability {{ _stable ? 'stable' : 'unstable' }}">
    <span> {{ _stable ? "APP Stable" : "APP Unstable" }} </span>
  </div>
}
