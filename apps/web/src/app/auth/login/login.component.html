<div class="page-wrap">
  <div class="login-card text-center">
    <h2 class="color-gray-dark">Fazer login no Trokaí</h2>

    <tk-login-form
      class="mt-24 pt-48 block"
      [loading]="loading"
      (submitted)="login($event)"
      (forgotPassword)="toForgot()"
      (register)="toRegister()"
    >
      <span class="label-caption-1 my-16 block">ou</span>

      <tk-google-btn (googleClick)="googleLogin()"></tk-google-btn>

      <button
        mat-stroked-button
        color="primary"
        aria-label="Entrar com Apple"
        (click)="appleLogin()"
        type="button"
        class="btn-social w-full mt-8"
      >
        <img
          slot="start"
          class="mr-24"
          src="../../../assets/img/apple-icon.svg"
          alt="Apple"
        />
        <span class="label-body-2"> Continuar com Apple</span>
      </button>
    </tk-login-form>
  </div>
</div>
