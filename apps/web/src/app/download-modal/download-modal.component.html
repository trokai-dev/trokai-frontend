<div class="dialog-wrapper">
  <!-- header -->
  <div class="dialog-header">
    <div class="d-flex justify-content-end">
      <button mat-icon-button class="close-button" [mat-dialog-close]="true">
        <mat-icon class="close-icon">close</mat-icon>
      </button>
    </div>
  </div>

  <!-- content -->
  <div class="dialog-content">
    <h2 class="color-gray-dark">Baixe o aplicativo</h2>

    <p class="label-body-1 mt-4">
      Para experimentar o Trokaí por completo, baixe gratuitamente o aplicativo
      para Android ou iOS.
    </p>

    <div class="row mt-40">
      <div
        class="col-10 offset-1 col-md-6 offset-md-0 d-flex justify-content-center"
        >
        <img
          id="phone-image"
          src="../../../../assets/img/imagem-celular.png"
          alt="Download aplicativo Trokaí"
          />
      </div>
      <div
        class="col d-flex flex-column align-items-center justify-content-around"
        >
        <div class="mx-4 d-none d-md-flex justify-content-center">
          <img
            src="../../../../assets/img/qr-code-download.png"
            class="w-75"
            alt="QRCode download aplicativo Trokaí"
            />
        </div>

        @if (!isAndroid && !isApple) {
          <div class="mt-5 w-100">
            <button
              (click)="clickDownload('android')"
              mat-stroked-button
              color="primary"
              class="w-100 d-flex align-items-center"
              >
              <ion-icon name="logo-google-playstore" class="mr-3"></ion-icon>
              Google Play
            </button>
            <button
              (click)="clickDownload('ios')"
              mat-stroked-button
              color="primary"
              class="w-100 mt-4 d-flex align-items-center"
              >
              <ion-icon name="logo-apple" class="mr-3"></ion-icon> App Store
            </button>
          </div>
        }

        @if (isAndroid || isApple) {
          <div class="w-100 mt-5">
            @if (isAndroid) {
              <button
                (click)="clickDownload('android')"
                mat-stroked-button
                color="primary"
                >
                <ion-icon name="logo-google-playstore" class="mr-3"></ion-icon>
                Baixar na Google Play
              </button>
            }
            @if (isApple) {
              <button
                (click)="clickDownload('ios')"
                mat-stroked-button
                color="primary"
                >
                <ion-icon name="logo-apple" class="mr-3"></ion-icon> Baixar na App
                Store
              </button>
            }
          </div>
        }
      </div>
    </div>
  </div>
</div>
