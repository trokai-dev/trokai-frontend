@if (!chats || chats.length === 0) {
  <div class="empty-page full">
    @if (true) {
      <ion-icon name="sad-outline"></ion-icon>
    }
    <span class="label-body-2 block"> Nenhuma mensagem</span>
  </div>
} @else {
  <!--  -->
  @for (c of chats; track c) {
    <div
      class="flex border-bottom py-48 px-24 cursor-pointer"
      (click)="openChat(c)"
    >
      <tk-user-avatar [user]="c.otherUser"></tk-user-avatar>

      <div class="block ml-16 flex-col" style="align-items: start !important">
        <div>
          <h6 class="label-body-1 text-dots color-gray-dark">
            {{ c.otherUser.seller?.storeName ?? c.otherUser.name }}
            <label class="label-caption-1 ml-8 color-gray-light-1">
              {{ c.lastMessage.createdAt | shortDate }}
            </label>
          </h6>
        </div>
        <label
          class="label-body-2 text-dots mt-8"
          [ngClass]="{ 'fw-bold': c.unreadCount }"
        >
          {{ c.lastMessage.text }}
        </label>
      </div>
    </div>
  }
}
