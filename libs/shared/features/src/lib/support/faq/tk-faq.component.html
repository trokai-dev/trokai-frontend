<mat-accordion>
  @for (topic of faq.topics; track topic) {
    <h3 class="mt-24 mb-8" [id]="topic.slug">{{ topic.title }}</h3>

    @for (q of topic.questions; track q) {
      <mat-expansion-panel [id]="q.slug" class="mat-elevation-z0">
        <mat-expansion-panel-header>
          <mat-panel-title>
            <h4>{{ q.question }}</h4>
          </mat-panel-title>
        </mat-expansion-panel-header>

        <p class="mt-8" [innerHTML]="getAnswerHtml(q.answer)"></p>
      </mat-expansion-panel>
    }
  }
</mat-accordion>
