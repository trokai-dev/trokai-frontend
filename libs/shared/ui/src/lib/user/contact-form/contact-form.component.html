@if (dismissable) {
  <div class="contact-form__close">
    <button
      mat-icon-button
      type="button"
      aria-label="Fechar"
      (click)="closed.emit()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
}

@if (loading) {
  <div class="contact-form__loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
} @else if (done) {
  <div class="contact-form__done">
    <mat-icon class="color-primary contact-form__done-icon"
      >check_circle</mat-icon
    >
    <h6 class="color-gray-dark">Mensagem enviada!</h6>
    <span class="label-body-2 color-gray-default">
      Vamos te responder, por email, em até 1 dia útil.
    </span>
    @if (dismissable) {
      <button
        mat-flat-button
        color="primary"
        class="contact-form__submit"
        (click)="closed.emit()"
      >
        Fechar
      </button>
    }
  </div>
} @else {
  <h2 class="color-gray-dark contact-form__title">Fale com o Trokaí</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="contact-form">
    <mat-form-field appearance="outline" class="contact-form__field">
      <mat-label>Nome</mat-label>
      <input
        matInput
        formControlName="name"
        type="text"
        [errorStateMatcher]="matcher"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="contact-form__field">
      <mat-label>E-mail para contato</mat-label>
      <input
        matInput
        formControlName="email"
        type="email"
        [errorStateMatcher]="matcher"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="contact-form__field">
      <mat-label>Escreva sua mensagem</mat-label>
      <textarea
        matInput
        formControlName="message"
        maxlength="500"
        rows="4"
        [errorStateMatcher]="matcher"
      ></textarea>
    </mat-form-field>

    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="contact-form__submit"
      [disabled]="loading"
    >
      Enviar mensagem
    </button>
  </form>
}
