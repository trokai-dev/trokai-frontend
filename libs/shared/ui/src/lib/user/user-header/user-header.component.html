@if (layout === 'row') {
  <div class="row-layout" role="button" tabindex="0" (click)="onClick()" (keyup.enter)="onClick()">
    <tk-user-avatar [user]="user" size="medium" />

    <div class="info-col">
      <span class="label-body-2 fw-semibold color-gray-dark capitalize text-dots">
        {{ user?.storeName ?? user?.name }}
      </span>

      @if (user?.address) {
        <span class="item-value color-gray-default address-text">
          {{ user.address?.city }}, {{ user.address?.state }}
        </span>
      }

      <div class="row-footer">
        <ng-content select="[reviews]" />
        @if (user?.storeVisibility === storeVisibility.PAUSED) {
          <tk-seller-status-badge
            [user]="user"
            [isLoggedUser]="isLoggedUser"
            (badgeClick)="sellerBadgeClick.emit()"
          />
        }
      </div>
    </div>

    @if (showChatButton) {
      <button mat-icon-button matTooltip="Abrir chat" (click)="$event.stopPropagation(); chatClick.emit()">
        <mat-icon class="color-primary">chat</mat-icon>
      </button>
    }
  </div>
} @else {
  <div class="card-layout" role="button" tabindex="0" (click)="onClick()" (keyup.enter)="onClick()">
    <div class="avatar-wrap">
      <tk-user-avatar [user]="user" size="medium" />
    </div>
    <span class="label-body-2 text-dots capitalize color-gray-dark">
      {{ user?.storeName ?? user?.name }}
    </span>
    <span class="label-caption-1 color-gray-1 text-dots">
      @{{ user?.nickname ?? '-' }}
    </span>
  </div>
}
