<!-- hidden multi-file input (web + native fallback) -->
<input
  type="file"
  accept="image/jpeg,image/jpg,image/png,image/webp"
  multiple
  hidden
  #fileInput
  (change)="onFilesSelected($event)"
/>

<!-- native camera/gallery chooser (only opened when capabilities.camera) -->
<button
  type="button"
  hidden
  [matMenuTriggerFor]="chooser"
  #addMenu="matMenuTrigger"
></button>
<mat-menu #chooser="matMenu">
  <button mat-menu-item type="button" (click)="pickFromCamera()">
    <mat-icon>photo_camera</mat-icon>
    <span>Tirar uma foto</span>
  </button>
  <button mat-menu-item type="button" (click)="pickFromGallery()">
    <mat-icon>collections</mat-icon>
    <span>Escolher da galeria</span>
  </button>
</mat-menu>

<div class="images-wrapper">
  <!-- empty state: prompt user to pick photos -->
  @if (slots.length === 0) {
    <button
      mat-stroked-button
      color="primary"
      class="add-empty"
      type="button"
      [disabled]="disabled || isLoading"
      (click)="triggerAdd()"
    >
      <mat-icon>add_photo_alternate</mat-icon>
      Adicionar fotos
    </button>
  }

  <!-- image grid (shown once at least one image exists) -->
  @if (slots.length > 0) {
    <div class="images-grid">
      @for (slot of slots; track slot; let i = $index) {
        <div
          class="box-image"
          mwlDraggable
          mwlDroppable
          [dropData]="i"
          (dragStart)="dragStart(i)"
          (dragEnd)="dragEnd()"
          (drop)="dropped($event.dropData, i)"
          [ngClass]="{ dragging: isDragging === i }"
        >
          <div class="badge">{{ i === 0 ? 'Capa' : i + 1 }}</div>
          <tk-image-picker
            [disabled]="disabled"
            mode="default"
            [autoCrop]="false"
            [externalURL]="slot.displayUrl"
            [sourceLgUrl]="slot.serverUrl"
            [rawSource]="slot.rawSource"
            [cropState]="slot.cropState"
            [showPreview]="true"
            (imagePick)="onImagePicked($event, i)"
            (rawImagePick)="onRawImagePicked($event, i)"
            (rawSourceChange)="onRawSourceChange($event, i)"
            (cropStateChange)="onCropStateChange($event, i)"
          ></tk-image-picker>
        </div>
      }

      <!-- add-more tile (after the last picker, hidden at limit) -->
      @if (!disabled && slots.length < MAX_IMAGES) {
        <div
          class="box-image box-image--add"
          role="button"
          tabindex="0"
          (click)="triggerAdd()"
          (keyup.enter)="triggerAdd()"
        >
          <div class="add-more-circle">
            <mat-icon>add</mat-icon>
          </div>
        </div>
      }
    </div>
  }
</div>

<div
  class="pictures-help-cta"
  role="button"
  tabindex="0"
  (click)="helpRequested.emit()"
  (keyup.enter)="helpRequested.emit()"
>
  <mat-icon class="help-icon">photo_camera</mat-icon>
  <span class="color-gray-dark">
    Fotos boas vendem mais!
    <span class="color-primary"><b> Ver dicas</b></span>
  </span>
</div>
