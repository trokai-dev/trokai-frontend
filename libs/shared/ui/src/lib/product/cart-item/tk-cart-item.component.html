<div
  class="cart-item mt-16"
  role="button"
  tabindex="0"
  (click)="clickProduct.emit()"
  (keyup.enter)="clickProduct.emit()"
>
  <img
    alt="{{ product.title }}"
    hideLoading
    loading="lazy"
    [src]="product.thumbnailUrl"
    class="cart-item-img"
  />

  <div class="cart-item-text">
    <span class="label-body-2 color-gray-dark capitalize"
      ><b>{{ product.title }}</b>
    </span>

    <span class="label-body-2 mt-8">
      {{ product.cost | cost | currency: 'BRL' : 'symbol' : '1.2' }}
    </span>
  </div>

  @if (showRemove) {
    <button
      mat-icon-button
      class="color-gray-light-1 button-remove"
      (click)="remove($event)"
    >
      <mat-icon>delete</mat-icon>
    </button>
  }
</div>
