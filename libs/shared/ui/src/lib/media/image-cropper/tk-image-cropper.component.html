<div class="dialog-wrapper">
  <div class="dialog-header border-bottom">
    <div class="flex justify-end">
      <button mat-icon-button class="close-button" (click)="close()">
        <mat-icon class="close-icon">close</mat-icon>
      </button>
    </div>

    <h4 class="color-gray-dark">Ajuste a foto</h4>
  </div>

  <div class="dialog-content">
    <div class="cropper-container">
      <image-cropper
        #cropper
        alignImage="center"
        backgroundColor="white"
        [imageFile]="myImageFile"
        [canvasRotation]="canvasRotation"
        [allowMoveImage]="false"
        [maintainAspectRatio]="aspect !== null"
        [transform]="transform"
        format="jpeg"
        output="blob"
        [autoCrop]="true"
        (imageCropped)="crop($event)"
        [cropperMinWidth]="128"
        [cropperMinHeight]="128"
        [(cropper)]="_cropper"
        [aspectRatio]="aspect ?? undefined"
        (imageLoaded)="imageLoaded()"
      >
      </image-cropper>
    </div>
  </div>

  <div class="dialog-footer">
    <div class="flex flex-wrap items-center w-full">
      <button mat-button (click)="zoom(true)">
        <mat-icon class="mr-4">add</mat-icon>Aproximar
      </button>
      <button mat-button (click)="zoom(false)">
        <mat-icon class="mr-4">remove</mat-icon>Afastar
      </button>
      <button mat-button (click)="rotate()">
        <mat-icon class="mr-4">refresh</mat-icon>Girar
      </button>
      <button
        mat-flat-button
        class="self-end mt-16"
        aria-label="salvar"
        (click)="saveAndLeave()"
        color="primary"
      >
        Continuar
      </button>
    </div>
  </div>
</div>
