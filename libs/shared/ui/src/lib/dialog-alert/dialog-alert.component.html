<mat-dialog-content>
  @if (data.title) {
    <h5 class="color-gray-dark">{{ data.title }}</h5>
  }

  <p class="label-body-2 mt-24" [innerHTML]="data.text"></p>

  @if (!data.dialogQuestion) {
    <mat-dialog-actions class="flex justify-end mt-24">
      <button mat-button color="primary" (click)="close(false)" cdkFocusInitial>
        {{ data.btnText }}
      </button>
    </mat-dialog-actions>
  }

  @if (data.dialogQuestion) {
    <mat-dialog-actions class="flex justify-end gap-8 mt-24">
      <button mat-stroked-button (click)="close(false)">
        {{ data.btnNoText ? data.btnNoText : "Não" }}
      </button>
      <button
        mat-raised-button
        color="{{ data.danger ? 'accent' : 'primary' }}"
        (click)="close(true)"
        >
        {{ data.btnOkText ? data.btnOkText : "Sim" }}
      </button>
    </mat-dialog-actions>
  }
</mat-dialog-content>
