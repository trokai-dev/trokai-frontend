<mat-dialog-content>
  @if (data.title) {
    <h5 class="color-gray-dark">{{ data.title }}</h5>
  }

  <p class="label-body-2 mt-4" [innerHTML]="data.text"></p>

  @if (!data.dialogQuestion) {
    <mat-dialog-actions class="row mt-24">
      <div class="col p-0 d-flex justify-content-end">
        <button mat-button color="primary" (click)="close(false)" cdkFocusInitial>
          {{ data.btnText }}
        </button>
      </div>
    </mat-dialog-actions>
  }

  @if (data.dialogQuestion) {
    <mat-dialog-actions class="row p-0 mt-24">
      <div class="col p-0 d-flex justify-content-end">
        <button class="mr-3" mat-stroked-button (click)="close(false)">
          {{ data.btnNoText ? data.btnNoText : "Não" }}
        </button>
        <button
          mat-raised-button
          color="{{ data.danger ? 'accent' : 'primary' }}"
          (click)="close(true)"
          >
          {{ data.btnOkText ? data.btnOkText : "Sim" }}
        </button>
      </div>
    </mat-dialog-actions>
  }
</mat-dialog-content>
