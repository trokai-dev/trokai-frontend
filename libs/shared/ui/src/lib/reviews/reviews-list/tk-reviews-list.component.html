<div class="reviews-list">
  @if (user) {
    <div class="flex items-center gap-16 reviews-header">
      <tk-user-avatar [user]="user" size="large"></tk-user-avatar>

      <div class="flex flex-col">
        <h2 class="name">{{ user.storeName ?? user.name }}</h2>

        <div class="flex items-center gap-8">
          <span class="label-body-2 average">{{
            user.reviewsAverage | number: '1.1-1'
          }}</span>

          <tk-review-stars
            [stars]="user.reviewsAverage"
            [showAmount]="false"
          ></tk-review-stars>

          <span class="label-caption-1 count">{{ user.reviewsAmount }} avaliações</span>
        </div>
      </div>
    </div>
  }

  <div class="reviews-content">
    @if (reviews?.length) {
      @for (review of reviews; track review) {
        <tk-review-card [review]="review"></tk-review-card>
      }
    } @else if (reviews) {
      <div class="flex flex-col items-center empty">
        <mat-icon>sentiment_dissatisfied</mat-icon>
        <span class="label-body-2">Nenhuma avaliação</span>
      </div>
    }
  </div>
</div>
