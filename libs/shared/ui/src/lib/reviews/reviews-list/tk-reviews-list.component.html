<div class="reviews-list">
  @if (user) {
    <tk-seller-header [user]="user" size="md" class="reviews-header">
      <div class="flex items-center gap-8">
        <span class="label-body-2 average">{{
          user.seller?.health?.reviewsAverage | number: '1.1-1'
        }}</span>

        <tk-review-stars
          [stars]="user.seller?.health?.reviewsAverage ?? 0"
          [showAmount]="false"
        ></tk-review-stars>

        <span class="label-caption-1 count"
          >{{ user.seller?.health?.reviewsAmount }} avaliações</span
        >
      </div>
    </tk-seller-header>
  }

  <div class="reviews-content">
    @if (reviews?.length) {
      @for (review of reviews; track review) {
        <tk-review-card [review]="review"></tk-review-card>
      }
    } @else if (reviews) {
      <div class="flex flex-col items-center empty">
        <mat-icon>sentiment_dissatisfied</mat-icon>
        <span class="label-body-2">Nenhuma avaliação</span>
      </div>
    }
  </div>
</div>
